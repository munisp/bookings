- name: Loan Application Intake
  duration_min: 45
  buffer_min: 15
  price_cents: 0
  capacity: 1
- name: Field Agent Visit
  duration_min: 60
  buffer_min: 30
  price_cents: 0
  capacity: 2
- name: Group Meeting (Esusu/Ajo/Chama)
  duration_min: 120
  buffer_min: 15
  price_cents: 0
  capacity: 30
