  duration_min: 90
  buffer_min: 15
  price_cents: 50000 # ₦500 per attendee
  capacity: 25
reminders:
  offsets: ["72h", "24h", "1h"]
  channels: ["sms", "email"]
knowledgeSeed:
- title: Hard rule — no rates, no approvals, intake only
  body: |
    The front desk NEVER quotes interest rates, fees or repayment terms and
    NEVER approves or promises loans. The correct answer to "how much
    interest?" or "will I get the loan?" is always: "That is for the loan
    officer to explain — let me book you a loan consultation." Loan
    decisions follow the cooperative's credit committee process after the
    intake interview; nothing on a call is a commitment. Balances, ledgers
    and loan statuses are never discussed on calls — they go to the
    member's field officer in person.
- title: Savings contribution collection (esusu/ajo/chama)
  body: |
    Members contribute daily, weekly or monthly, or by esusu/ajo rotation.
    A field officer collects cash contributions on a booked round and
    issues a receipt for every collection; members can also pay by bank
    transfer, OPay or PalmPay to the cooperative account. Missed
    contributions do not attract penalties on a call — the field officer
    agrees a catch-up plan with the member. Group meetings (esusu/ajo
    rounds) are scheduled for up to 30 members; the meeting venue and the
    rotation order are confirmed by SMS the day before.
- title: Loan application intake checklist
  body: |
    Loan intake captures: full name, phone number, group/cooperative
    membership, amount requested, purpose of the loan, one guarantor (name
    and phone), and how long the member has been saving with us. Documents
    to bring to the consultation: one valid ID (national ID, voter's card
    or driver's license), passport photograph, and the guarantor's ID
    details. First-time borrowers usually start with smaller group-guaranteed
    loans — the loan officer explains options at the consultation.
- title: Field agent visits
  body: |
    Field agent visits are for members who cannot reach the office: new
    member registration, contribution collection rounds and group
    formation. Visits are booked in 60-minute slots with a 30-minute travel
    buffer, Monday to Saturday 8:00 to 17:00 (WAT). The field officer
    always carries an ID card and calls the member before arriving. If the
    member is not available, the visit is rescheduled once for free.
- title: Fraud and safety notice
  body: |
    The cooperative will NEVER call, text or WhatsApp to ask for your PIN,
    card number, BVN or one-time passcode (OTP). Field officers never ask
    for payments outside the official receipt and collection process. If
    anyone claiming to be from the cooperative asks for cash or codes
    outside a booked visit, do not pay — report it to the office
    immediately.
dashboardLabels:
  bookingSingular: Appointment
  bookingPlural: Appointments
  customerTerm: Member
agents:
- id: loan-intake-officer
  name: Loan Intake Officer
  persona: |
    You are the cooperative's loan intake officer. You take loan
    application details (name, phone, group, amount requested, purpose,
    guarantor), explain which documents to bring to the consultation, and
    book the loan consultation slot. You NEVER quote interest rates,
    repayment terms or fees, and you never approve, pre-approve or promise
    a loan — your reply is always "the loan officer will explain everything
    at your consultation". You never discuss balances or existing loans.
    Mirror the caller's register — full Pidgin if they speak Pidgin.
  intents: [loan, loans, borrow, credit, "interest rate", interest, repayment, guarantor, "apply for loan", application]
- id: savings-coordinator
  name: Savings Coordinator
  persona: |
    You are the cooperative's savings coordinator. You register savings
    contribution collection requests (daily, weekly, esusu/ajo rotation),
    explain payment options (cash to a field officer with receipt, bank
    transfer, OPay, PalmPay), schedule group meetings and confirm rotation
    order by SMS. You never discuss a member's balance or ledger — that is
    the field officer's job in person.
  intents: [savings, save, contribution, esusu, ajo, chama, deposit, "group meeting", rotation, collect, collection]
