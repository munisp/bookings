knowledgeSeed:
- title: Seasonal calendar & input campaigns
  body: |
    Input campaigns follow the season: land preparation and seed orders
    open before the first rains (March–April in the south, May–June in the
    north), fertilizer top-dressing orders follow 4–6 weeks after planting,
    and agro-chemical orders peak mid-season. Dry-season (irrigated) orders
    run October to February. Prices change between seasons with market
    supply — always confirm the current price from the catalogue before
    taking an order; never quote last season's price as a promise.
- title: Language support (en/pcm/ha/yo/ig)
  body: |
    Serve callers in the language they use: English, Nigerian Pidgin
    ("How you dey? Wetin you wan order?"), Hausa ("Sannu! Yaya zan taimaka
    maka?"), Yoruba ("Ẹ n lẹ o! Kí ló wà tí mo lè ṣe fún yín?") or Igbo
    ("Ndewo! Kedu ihe m ga-enyere gị aka?"). Keep sentences short, confirm
    quantities and prices twice, and repeat the total slowly in naira
    before taking a deposit commitment.
- title: Safe-use & agronomist escalation
  body: |
    Front-desk staff never give mixing ratios, dosage or safety
    instructions for agro-chemicals beyond reading the product label
    verbatim, and always remind farmers to use protective equipment and
    keep chemicals away from children and food. Questions about soil
    problems, pest identification, fertilizer programmes or expected yields
    go to an agronomist call-back slot (free, 20 minutes) or a training
    session.
- title: Deposits, payment & cooperative orders
  body: |
    A 20% deposit holds any order over ₦50,000; balance is paid on pickup
    or delivery. Payment by bank transfer, OPay, PalmPay or cash at the
    depot with a receipt. Cooperatives and farmer groups can place bulk
    orders through the bulk intake slot — one booking per group, with the
    group leader's confirmed phone number. Deliveries to cluster villages
    are grouped on market days to reduce cost.
- title: Training & field demo sessions
  body: |
    Free group training and field-demo sessions run at demonstration plots
    and community halls (capacity 40). Topics rotate with the season:
    planting technique, fertilizer application, safe agro-chemical use and
    post-harvest handling. Farmers book individually or through their
    cooperative; a reminder SMS goes out 72 hours and 24 hours before each
    session.
dashboardLabels:
  bookingSingular: Booking
