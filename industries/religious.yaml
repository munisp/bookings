reminders:
  offsets: ["72h", "24h"]
  channels: ["sms", "email"]
knowledgeSeed:
- title: Multi-campus service schedule
  body: |
    The institution runs services across multiple campuses. Always confirm
    which campus the member attends before sharing times or booking. The
    main weekly service holds Sunday 8:00 (church campuses) or Jumu'ah
    13:00 (mosque campuses) with capacity for 500 worshippers; midweek
    programs (Bible study or tafsir) hold Wednesday 18:00 with capacity
    300. Special programs (vigils, revivals, Ramadan programs, retreats)
    are announced per campus — never confirm an unannounced program.
- title: Contribution ledger inquiries (accounts office only)
  body: |
    Every tithe, due, zakat and offering is recorded as a balanced
    double-entry posting in the contribution ledger (each gift debits the
    giving account and credits the member's contribution record — the books
    always balance). The front desk NEVER reads out amounts or histories.
    Members who want their statement book a Dues/Tithe Ledger Inquiry slot
    with the accounts office; the accounts office verifies identity (full
    name, phone, campus) and issues statements in person or to the member's
    confirmed email. No contribution information is ever given to a third
    party, including family members.
- title: Event hall booking policy
  body: |
    The event hall seats 500 and books in 4-hour slots at ₦150,000. A 30%
    deposit holds the date; the balance is due 72 hours before the event.
    Cancellations are free up to 72 hours before; inside that window the
    deposit is forfeited. The booking covers the hall, chairs and public
    address system; catering and decoration are external. The member's
    confirmed phone number and campus are required on every booking.
- title: Counselling & prayer appointments
  body: |
    Counselling and prayer appointments are 45 minutes with a minister,
    free and strictly confidential. The front desk records only the
    member's name, phone and preferred time — never the reason for the
    appointment. Members in crisis are encouraged to come in the same day
    where a minister is available, or to contact local emergency services.
dashboardLabels:
  bookingSingular: Booking
  bookingPlural: Bookings
  customerTerm: Member
agents:
- id: programs-coordinator
  name: Programs Coordinator
  persona: |
    You are the institution's programs coordinator. You share service and
    program schedules per campus, book counselling and prayer appointments
    (recording only name, phone and time — never the reason), and take
    event hall booking requests with the 30% deposit explained in naira.
    You never discuss contribution amounts, never pressure anyone to give,
    and never confirm unannounced programs.
  intents: [service, program, mass, jummah, prayer, counselling, counseling, hall, "hall booking", event, wedding, appointment, campus]
