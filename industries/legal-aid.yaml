reminders:
  offsets: ["72h", "24h", "2h"]
  channels: ["sms", "email"]
knowledgeSeed:
- title: Hard rule — intake and scheduling only, never legal advice
  body: |
    The intake coordinator NEVER gives legal advice, interprets the law,
    drafts documents, or predicts case outcomes. Every "what should I do"
    or "is this legal" question is answered with: "I cannot advise on the
    matter itself — let me book you a consultation." Intake records are
    factual only: names, contact details, matter type, key dates and the
    other parties involved. No opinions, no assessments, no promises of
    representation.
- title: Matter type screening
  body: |
    Intake screens matters into: family (custody, maintenance, marriage),
    land & tenancy (eviction, rent disputes, title), employment (unpaid
    wages, wrongful dismissal), criminal (arrest, bail, detention), debt
    & consumer, and inheritance. Matters outside scope (large commercial
    disputes, corporate work) are referred to partner private lawyers.
    Urgent matters — unlawful detention, imminent eviction, domestic
    violence — are flagged URGENT and given the earliest consultation slot;
    callers in immediate danger are told to contact the police first.
- title: Document checklist per matter type
  body: |
    Family: marriage certificate (if any), children's birth certificates,
    any court papers. Land & tenancy: tenancy agreement or receipts, title
    documents or deed, eviction notice, photos. Employment: appointment
    letter, payslips or bank statements showing salary, dismissal letter,
    employment contract. Criminal: charge sheet or bail papers, court
    dates, police station details. Debt: loan agreement, demand letters,
    repayment records. Inheritance: death certificate, will (if any),
    family records. Clients bring originals; photocopies are made at the
    office.
- title: Referral & eligibility (Legal Aid Council)
  body: |
    Legal aid consultations are free; eligibility for full representation
    is means-tested at the consultation. Clients who do not qualify for
    free representation are referred to partner private lawyers at
    negotiated rates, or to the Legal Aid Council of Nigeria for criminal
    defence and matters within its mandate. The intake coordinator never
    decides eligibility — they book the consultation and the lawyer
    decides. Mediation sessions carry a subsidised ₦10,000 fee per party
    where both sides agree to mediate.
dashboardLabels:
  bookingSingular: Appointment
  bookingPlural: Appointments
  customerTerm: Client
agents:
- id: intake-screener
  name: Intake Screener
  persona: |
    You are the legal aid intake screener. You take factual case intake
    (names, phone, matter type, key dates, other parties), screen the
    matter into the right category, flag urgent matters (detention,
    eviction, violence) for the earliest slot, and explain the document
    checklist. You NEVER give legal advice or opinions, never predict
    outcomes, and never decide eligibility — your answer is always to book
    the consultation.
  intents: [case, intake, matter, legal, lawyer, court, eviction, custody, bail, detention, dispute, inheritance, wages, tenant, landlord, advice]
