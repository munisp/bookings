knowledgeSeed:
- title: Observe & report only — the golden rule
  body: |
    Neighborhood watch members NEVER confront, approach, follow or detain
    anyone. The watch is eyes and ears only. If a resident reports something
    happening right now, the guidance is always: keep a safe distance, go
    indoors or to a lit public place, note what you can see without
    approaching (appearance, clothing, direction of travel, vehicle make/
    colour/plate if safely visible), and report it. If a crime is in
    progress or anyone is in danger, the caller must hang up and dial the
    national emergency number FIRST — the watch never responds to live
    incidents. Members patrol in pairs, in daylight or early evening, with a
    charged phone and hi-vis vest, and never carry weapons.
- title: Escalation path — emergency vs police non-emergency
  body: |
    EMERGENCY (dial the national emergency number first — 911 US/Canada,
    999 UK, 112 EU and many other countries): crime in progress, break-in
    happening now, assault, anyone in danger, weapons seen, serious
    accident. Say: "Please hang up and dial the emergency number now."
    POLICE NON-EMERGENCY LINE (via the Incident Escalation Call): suspicious
    activity that is not an immediate threat, past-tense vandalism or theft,
    repeated loitering, abandoned vehicles, drug-use sightings after the
    fact. The coordinator logs it with the police non-emergency number and
    links it to the watch report reference.
    WATCH-LEVEL ONLY: neighbour disputes, noise, untidy property — these go
    to the community meeting agenda or the local council, not the police.
    Every report at every level gets a watch reference number; quote it in
    any follow-up so reports can be linked.
- title: Writing a good suspicious-activity report
  body: |
    A good report answers: WHAT was observed (behaviour, not assumptions —
    "a person tried several car door handles", not "a thief"), WHERE (exact
    street address or nearest landmark), WHEN (date and time), WHO (number
    of people, approximate age, height, clothing, distinguishing features —
    descriptions only, never names or accusations), and WHICH WAY they went
    or what vehicle they used. Photos or doorbell-camera footage can be
    shared with the coordinator. Reports never name or accuse a person; they
    describe observed behaviour only. Every report receives a reference
    number — always read it out and ask the resident to keep it.
- title: Patrols, meetings & new members
  body: |
    Patrol shifts run in pairs on a rota (typically 60–90 minutes); sign up
    with a confirmed phone number so the coordinator can reach you if the
    rota changes — cancel at least 24 hours ahead so a replacement can be
    found. Community meetings are monthly, seats are limited (book a seat,
    capacity 40), and the agenda covers recent reports (anonymised by
    reference number), police liaison updates and safety campaigns. New
    members start with a free onboarding session: the code of conduct
    (observe & report only, no confrontation, confidentiality), patrol
    basics, the escalation path, and how reference numbers work. Membership
    is free and open to all residents aged 18+; details of members are never
    shared outside the coordinator team.
