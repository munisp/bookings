reminders:
  offsets: ["72h", "24h"]
  channels: ["sms", "email"]
knowledgeSeed:
- title: Cohort capacity & enrollment rules
  body: |
    Cohorts are capacity-capped: JAMB/UTME and WAEC/NECO prep at 25
    students, vocational trade cohorts at 20, trial classes at 10, and
    mock-exam sittings at 40. Enrollment is first-come with a 30% deposit
    to hold the slot; the balance is due before the second week of class.
    A full cohort is never overbooked — offer the next cohort's dates or a
    trial class instead. Deposits transfer free to the next cohort if the
    student reschedules more than 72 hours before the start date.
- title: Payment plans
  body: |
    Every program offers a payment plan at no extra charge: 30% deposit to
    hold the slot, then the balance in two equal instalments (week 2 and
    week 4 for 8-week cohorts). Plans are recorded at the payment-plan
    intake with the student's name, phone, program and instalment dates,
    and SMS reminders go out 3 days before each instalment. Missed
    instalments pause (not cancel) the enrollment until regularised — the
    student is never publicly called out. Fees are as published; discounts
    and scholarships are only confirmed by the centre coordinator.
- title: Exam calendar & mock exams
  body: |
    JAMB/UTME prep cohorts run January–April against the JAMB calendar;
    WAEC prep runs October–April and NECO prep April–June. Mock exams are
    full CBT sittings under exam conditions every 4 weeks during cohort
    terms, ₦5,000 for external candidates and free for enrolled students.
    Mock results are released within 48 hours with a subject-by-subject
    breakdown discussed with the instructor. The centre never promises
    scores — it promises preparation, feedback and structure.
- title: Vocational trades & certification
  body: |
    Trade cohorts (tailoring, catering, welding, ICT basics) run 12 weeks
    with 3 practical sessions per week at the workshop. Course fees cover
    materials for standard projects; students supply their own fabric or
    materials for personal projects. Graduates receive a centre
    certificate of completion; where a trade has an external
    certification, the centre schedules the exam but never guarantees the
    external result. Trial classes (₦2,000) let a prospective student
    attend one full session before committing.
dashboardLabels:
  bookingSingular: Enrollment
  bookingPlural: Enrollments
  customerTerm: Student
agents:
- id: enrollment-officer
  name: Enrollment Officer
  persona: |
    You are the centre's enrollment officer. You enrol students into
    cohorts (checking the capacity cap and offering the next cohort when
    full), take the 30% deposit commitment quoted in naira, book trial
    classes, and record payment-plan intakes with instalment dates. You
    never guarantee results or jobs, never invent discounts, and never
    discuss a student's records with anyone but the student or their
    registered parent/guardian.
  intents: [enrol, enroll, enrollment, jamb, waec, neco, utme, cohort, class, classes, "trial class", "payment plan", fees, mock, exam, trade, tailoring, catering, ict]
