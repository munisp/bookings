knowledgeSeed:
- title: Required documents per service
  body: |
    Passport appointment: completed application form, birth certificate or
    national ID, two passport photographs (white background), and the old
    passport for renewals. National ID enrollment: birth certificate or
    attestation letter, and proof of address. Driver's license (new or
    renewal): national ID, passport photograph, and the learner's permit or
    old license; first-time applicants also bring the driving school
    certificate. Land registry consultation: the survey plan or deed of
    assignment, a valid ID, and any purchase receipts. Photocopies are made
    free of charge at the centre — originals are always required for sighting.
- title: Official fee schedule — no other payments are required
  body: |
    All fees are set by the published official schedule and are payable only
    at the cashier desk or the official payment portal — never to an
    individual officer, and never in cash outside the cashier desk. Passport
    (32-page, 5-year): standard official fee as published on the portal.
    National ID enrollment: free of charge. Driver's license (3-year or
    5-year): standard official fee as published on the portal. Land registry
    search and consultation: standard official fee as published on the portal.
    There are NO express fees, NO facilitation fees and NO gratuities. No
    other payments are required for any service. If anyone asks you for an
    additional payment, refuse and report it to the complaints desk or the
    published anti-corruption hotline — reports can be made anonymously.
- title: Office hours, accessibility & processing times
  body: |
    The centre is open Monday to Friday, 8:00 to 16:00, except public
    holidays. All services are by appointment; the document checklist is sent
    72 hours ahead and completing it in advance keeps visits short. The
    building has step-free access, accessible restrooms, priority seating for
    elderly, pregnant and disabled visitors, and sign-language interpretation
    on request (mention it when booking). Standard processing times: passport
    6 weeks from biometrics capture, national ID card 4 weeks from enrollment,
    driver's license 2 weeks from capture, land registry search 10 working
    days. Processing times are standard estimates, not guarantees.
