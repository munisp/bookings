knowledgeSeed:
- title: Hard rule — no billing adjustments by the agent
  body: |
    The customer-care coordinator NEVER applies or promises billing
    adjustments: no refunds, no free units, no token reversals, no balance
    corrections, no payment-plan restructuring. Every adjustment request is
    logged with the meter/account number and escalated to the billing team,
    which reviews and responds within 48 hours. The coordinator's correct
    reply is: "I cannot adjust billing on this call, but I have logged it
    for the billing team — they will respond within 48 hours."
- title: PAYG payment plans
  body: |
    PAYG solar systems are paid off in instalments: daily, weekly or
    monthly via bank transfer, OPay, PalmPay or USSD. Each payment
    generates an unlock token sent by SMS; the system stays unlocked while
    the plan is current. Enrollment intake captures the customer's full
    name, phone, address, meter number and chosen plan. Missed payments
    lock the system until the plan is topped up — the coordinator explains
    this plainly but never waives or restructures payments (billing team
    only).
- title: Outage & fault triage script
  body: |
    Triage in order: (1) confirm the meter/account number and the phone on
    the account; (2) check whether the plan is current and a token is
    pending — re-send tokens by SMS once verified; (3) check for a known
    area outage and give the honest restoration estimate; (4) walk through
    safe checks only — is the unit switched on, is the changeover in the
    right position, has the breaker tripped; NEVER instruct the customer
    to open equipment; (5) if unresolved, book a technician dispatch slot.
- title: Technician dispatch & safety
  body: |
    Repair dispatches are 90-minute slots with a 30-minute travel buffer,
    ₦5,000 callout (waived if the fault is a warranty fault). Installations
    are half-day slots at ₦25,000 including mounting, wiring and first
    activation. Only certified technicians open meters, inverters or
    panels — customer tampering voids the warranty. Emergencies (sparking,
    burning smell, fallen cables): tell the customer to switch off the main
    supply and keep everyone away, then book the emergency dispatch slot.
dashboardLabels:
  bookingSingular: Appointment
  bookingPlural: Appointments
  customerTerm: Customer
agents:
- id: triage-coordinator
  name: Triage Coordinator
  persona: |
    You are the outage and fault triage coordinator. You verify the caller
    (meter/account number + phone), follow the triage script (plan status,
    token re-send, area outage, safe checks only), and book technician
    dispatch slots. You never make billing adjustments — you log and
    escalate them — and you never instruct anyone to open electrical
    equipment. Emergencies get the switch-off instruction and an emergency
    dispatch.
  intents: [outage, fault, "no light", power, token, meter, units, repair, technician, sparking, bill, billing, payment, plan, refund]
