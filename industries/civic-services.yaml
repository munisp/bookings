knowledgeSeed:
- title: Emergency triage — gas leaks & downed power lines FIRST
  body: |
    These are NEVER ordinary 311 reports — tell the caller to hang up and
    dial the national emergency number FIRST (911 US/Canada, 999 UK, 112 EU
    and many other countries), then the utility's 24h emergency line: smell
    of gas or a hissing gas pipe (also advise: do not switch lights or
    appliances on/off, open windows, leave the building); downed, sparking
    or low-hanging power lines (also advise: stay at least 10 metres away,
    keep others away, never touch anything in contact with the line). Also
    treat as emergencies: burst water main flooding a road or property, an
    unstable tree or wall about to collapse, a live sinkhole. The 311 desk
    NEVER dispatches emergency crews and NEVER promises response times for
    hazards — emergency services and the utility handle those.
- title: Department routing
  body: |
    Every report is routed to one department; if a report spans two, log the
    primary department and note the secondary in the ticket. ROADS &
    HIGHWAYS: potholes, damaged pavements/sidewalks, road signs, blocked
    drains on the road surface, faded road markings. STREET LIGHTING: broken
    or flickering streetlights, lights on during the day, damaged lamp
    columns (quote the column number if the resident can see one).
    SANITATION & WASTE: missed bin collections, overflowing public bins,
    fly-tipping/illegal dumping, street sweeping. WATER & SEWER: water leaks
    on public land, leaking hydrants, blocked or overflowing public sewers
    (internal plumbing is the resident's own plumber, not the council).
    PARKS & GREEN SPACES: fallen or dangerous trees in parks (urgent ones go
    to emergency triage first), broken play equipment, damaged benches,
    overgrown paths, graffiti in parks. NOISE: noise complaints are logged
    for the environmental-health team and routed there for assessment.
- title: SLA expectations (standard estimates, never guarantees)
  body: |
    Published standard service levels — always quote as "the standard
    target", never as a promise: potholes — inspection within 5 working
    days; dangerous potholes (deep, in the traffic lane) are prioritised for
    inspection within 24 hours. Streetlights — repair within 7 working days
    (council-owned columns; utility-owned columns are passed to the utility
    and can take longer). Missed bin collection — return visit within 2
    working days if reported within 24 hours of the scheduled collection and
    the bin was out by 6:00. Water leaks on public land — assessment within
    24–48 hours. Noise complaints — an assessment visit or monitoring is
    arranged within 10 working days; persistent noise may need a diary
    sheet. Fly-tipping on public land — clearance within 5 working days.
    If an SLA is missed, book a follow-up/status call quoting the ticket
    reference and it is escalated to the department supervisor. NEVER
    invent a faster time to please a caller.
- title: What to have ready when reporting
  body: |
    Ask every caller for: (1) EXACT LOCATION — street name and number, or
    the nearest house number, junction or post code; "outside number 42" or
    "opposite the bus stop on Market Street" is ideal. (2) LANDMARK — a shop,
    school, park gate or junction nearby so crews find it first time. (3)
    PHOTO DESCRIPTION — if the resident has photos, ask them to describe
    what the photo shows and keep it; the ticket notes that photos exist and
    how to submit them. (4) DETAILS PER TYPE — pothole: approximate size
    (e.g. dinner-plate, wheelie-bin lid) and depth, and whether it is in the
    road, cycle lane or pavement; streetlight: the column number stencilled
    on the post; missed collection: bin type (general/recycling/garden) and
    when it was put out; water leak: where water is surfacing and whether it
    is flowing or pooling; noise: the source type, times it happens and how
    long it has been going on. (5) CALLBACK NUMBER — required to confirm the
    ticket. Finish by issuing the TICKET REFERENCE — every report gets one —
    read it slowly, spell any letters, and explain the resident can quote it
    on a follow-up/status call at any time for an update.
- title: Follow-up & status calls
  body: |
    Status calls need the ticket reference — ask for it first; without it,
    offer to look the ticket up by the caller's confirmed phone number and
    street. Give the current status exactly as logged (received, routed,
    inspection scheduled, work ordered, completed) and restate the
    standard SLA for that report type as an estimate. If the SLA has
    passed, apologise, mark the ticket for escalation to the department
    supervisor, and confirm the resident will get an update — never guess
    new dates. If the problem has got worse or become dangerous, re-run
    the emergency triage (gas leaks, downed power lines, flooding mains,
    collapse risks → national emergency number FIRST) before updating the
    ticket. Residents can book a follow-up call at any time; duplicate
    reports of the same issue are linked to the original ticket reference,
    not opened as new tickets.
