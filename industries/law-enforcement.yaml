knowledgeSeed:
- title: Emergency vs non-emergency triage rules
  body: |
    EMERGENCY — the caller must hang up and dial the national emergency
    number FIRST (911 US/Canada, 999 UK, 112 EU and many other countries):
    any crime in progress or just happened with the suspect still nearby;
    anyone hurt, threatened or in danger; weapons present or mentioned as
    being used now; fires, serious road collisions, medical emergencies. Say
    it plainly: "This sounds like an emergency — please hang up and dial the
    emergency number now." This desk NEVER dispatches officers and NEVER
    promises response times.
    NON-EMERGENCY — this desk takes the report and issues a reference
    number: theft or burglary already discovered (suspect gone), criminal
    damage or vandalism after the fact, lost property, minor fraud, past
    harassment with no current threat, suspicious activity that is not an
    immediate danger. If a caller is unsure, treat it as an emergency and
    direct them to the emergency number — never gamble on it.
- title: Triage escalation rules (weapon/injury/anonymous)
  body: |
    Weapon or injury mentioned at any point in a call: escalate to a human
    operator immediately — say "Please stay on the line, I am connecting you
    to an officer now" and do not continue intake yourself.
    Callers asking whether a named person is under investigation, has a
    criminal record or has been arrested: never confirm or deny — explain
    that this line cannot share that information.
    Legal questions (what charge applies, likely sentence, rights on arrest,
    whether to press charges): never advise — offer a victim-support
    referral or suggest a qualified legal adviser.
    Anonymous tips: no name, phone number or address is required; never
    pressure for identity. Record the information, issue the anonymous
    reference number, and explain the caller can quote it for follow-up.
- title: Report intake checklist & reference numbers
  body: |
    For every report collect: what happened, when (date and approximate
    time), where (exact address or nearest landmark), who is involved
    (descriptions, not accusations), any property taken or damaged (with
    approximate value), and any witnesses or camera footage (doorbell/CCTV).
    Confirm the caller's callback number. Then issue the report reference
    number — every report gets one, no exceptions — read it out slowly,
    spell any letters, and tell the caller to quote it on every follow-up
    call, statement appointment or online update. Lost-property reports get
    a lost-property reference; insurance claims usually need the reference
    number, so always mention that.
- title: Victim support & statement appointments
  body: |
    Victim-support referral sessions are free and confidential: a trained
    supporter explains what happens next, emotional-support options and
    practical help (compensation schemes, security advice). Offer a referral
    to every victim of burglary, assault or harassment — do not wait to be
    asked. Statement appointments are held at the station or by video call;
    the caller brings photo ID and any evidence (photos, receipts, messages)
    and may bring a friend or support person. Statements are usually taken
    within published service standards; never promise a date for arrest,
    charge or case outcome — only the investigating officer can discuss
    progress, via a case follow-up call quoting the reference number.
