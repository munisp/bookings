version: 2

models:
  - name: daily_bookings_per_tenant
    description: Booking funnel counts per tenant per day (gold table).
    tests:
      - unique:
          column_name: "tenant_id || '|' || cast(day as varchar)"
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: day
        tests: [not_null]
      - name: bookings_created
      - name: bookings_confirmed
      - name: bookings_cancelled
      - name: no_shows

  - name: revenue_daily
    description: Captured/refunded/no-show-fee and net revenue per tenant per day per currency.
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "net_revenue_cents = captured_revenue_cents - refunded_cents + no_show_fees_cents"
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: day
        tests: [not_null]
      - name: currency
        tests: [not_null]
      - name: net_revenue_cents

  - name: no_show_rate
    description: No-show share of expected appointments per tenant per day.
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "no_show_rate >= 0 and no_show_rate <= 1"
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: day
        tests: [not_null]
      - name: no_show_rate

  - name: agent_containment_rate
    description: Share of conversations with no human handoff per tenant per day.
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "containment_rate >= 0 and containment_rate <= 1"
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: day
        tests: [not_null]
      - name: conversations_total
      - name: containment_rate

  - name: reco_pricing
    description: >
      Pricing recommendations per tenant/offering (peak-hour distribution,
      suggested peak multiplier, suggested deposit pct from the no-show band).
      Written by the Spark revenue_intelligence job; this model is a
      passthrough view (SPEC-W3 §3 innovation 9).
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "suggested_peak_multiplier >= 1.0 and suggested_deposit_pct between 0 and 100"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "peak_hour between 0 and 23 and peak_share between 0 and 1 and no_show_rate between 0 and 1"
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: offering_id
        tests: [not_null]
      - name: computed_at
      - name: bookings_30d
      - name: net_revenue_cents_30d
      - name: peak_hour
      - name: peak_share
      - name: no_show_rate
      - name: suggested_peak_multiplier
      - name: suggested_deposit_pct

  - name: usage_daily
    description: >
      Total usage per tenant per day per metric (Wave 5 #9) — the usage-metered
      API monetization foundation (STRATEGY.md §2 item 2). Sparse by design:
      v1 covers booking + call-minute metrics; rows exist only where usage
      was recorded.
    tests:
      - unique:
          column_name: "tenant_id || '|' || metric || '|' || cast(date as varchar)"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "total_value >= 0"
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: date
        tests: [not_null]
      - name: metric
        tests: [not_null]
      - name: total_value
        tests: [not_null]

  - name: geo_demand_h3
    description: >
      Bookings per H3 res-8 cell per tenant per day, with the cell polygon as
      WKT (SPEC-W8 Part B1). Written by the Spark geo_analytics job
      (Apache Sedona ST_H3CellIDs); this model is a passthrough view.
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "bookings >= 0"
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: day
        tests: [not_null]
      - name: h3_cell
        description: H3 res-8 cell id (uint64/bigint).
        tests: [not_null]
      - name: h3_cell_str
        description: H3 string index (hex of h3_cell) for JS/Trino interop.
      - name: cell_wkt
        description: Cell polygon as WKT; Trino ST_GeometryFromText(cell_wkt).
      - name: bookings

  - name: geo_service_area_coverage
    description: >
      Bookings inside vs outside each tenant service area per day (ST_Within
      spatial join in the Spark geo_analytics job against the service-areas
      extract; SPEC-W8 Part B1). Passthrough view.
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "bookings_inside >= 0 and bookings_outside >= 0"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "coverage_share >= 0 and coverage_share <= 1"
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: day
        tests: [not_null]
      - name: service_area_id
        tests: [not_null]
      - name: service_area_name
      - name: bookings_inside
      - name: bookings_outside
      - name: coverage_share

  - name: geo_hourly_density
    description: >
      Demand heat cells by hour-of-week (day_of_week 1=Sunday..7=Saturday,
      hour 0-23) per H3 res-8 cell for staffing heatmaps. Written by the
      Spark geo_analytics job; passthrough view. No cell geometry — join to
      geo_demand_h3 on h3_cell.
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "day_of_week between 1 and 7 and hour between 0 and 23 and bookings >= 0"
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: day_of_week
      - name: hour
      - name: h3_cell
        tests: [not_null]
      - name: h3_cell_str
      - name: bookings
