# Federated access to the operational Postgres (SPEC §7 DBs: identity, booking,
# conversation, knowledge, analytics_meta) for ad-hoc joins with lakehouse tables.
# NOTE: Trino catalog files do not interpolate env vars — the dev password must match
# the core postgres service (infra/docker-compose.yml / POSTGRES_PASSWORD, default postgres).
connector.name=postgresql
connection-url=jdbc:postgresql://postgres:5432/booking
connection-user=opendesk
connection-password=opendesk

# Per-database access uses fully-qualified names via catalog.session or additional catalogs;
# this catalog defaults to the `booking` DB which holds bookings/offerings for mart joins.
postgresql.connection-pool.enabled=true
insert.non-transactional-insert.enabled=true
