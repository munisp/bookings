# Iceberg catalog → REST catalog service (warehouse s3://lake/warehouse on MinIO).
# Trino 448 native S3 filesystem. Dev creds match infra/docker-compose.lakehouse.yml (minio).
connector.name=iceberg
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://iceberg-rest:8181
iceberg.rest-catalog.security=NONE
iceberg.rest-catalog.vended-credentials-enabled=false

fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.path-style-access=true
s3.aws-access-key=minioadmin
s3.aws-secret-key=minioadmin
s3.region=us-east-1

# Dev ergonomics
iceberg.file-format=PARQUET
iceberg.compression-codec=ZSTD
iceberg.register-table-procedure.enabled=true
iceberg.add-files-procedure.enabled=true
