# Termii SMS output binding (Nigeria channel) — HTTP binding onto the
# messaging-gateway service, which owns TERMII_API_KEY, retries and error
# mapping. Invoke with operation "post" and data {"to": "...", "message": "..."}.
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: bindings-termii
spec:
  type: bindings.http
  version: v1
  metadata:
    - name: url
      value: "http://messaging-gateway:7011/v1/termii/sms"
scopes:
  - notification
