# Local env-var secret store for DEV ONLY. Secrets are read from the sidecar's
# environment variables (e.g. REDIS_PASSWORD, SMTP_PASSWORD, TWILIO_AUTH_TOKEN).
# Production swaps this for a real vault-backed store without touching components.
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: envvar-secret-store
spec:
  type: secretstores.local.env
  version: v1
scopes:
  - booking
  - conversation
  - notification
  - payments
  - identity
  - knowledge
  - voice
  - edge
  - analytics
