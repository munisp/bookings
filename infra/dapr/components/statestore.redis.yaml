# Redis state store (SPEC §3). actorStateStore=true so Dapr actors can use it
# (reminder/session state). Dev password comes from the local env secret store.
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: "redis:6379"
    - name: redisPassword
      secretKeyRef:
        name: REDIS_PASSWORD
        key: REDIS_PASSWORD
    - name: actorStateStore
      value: "true"
    - name: enableTLS
      value: "false"
auth:
  secretStore: envvar-secret-store
scopes:
  - booking
  - conversation
  - notification
  - payments
  - identity
  - knowledge
  - voice
  - edge
