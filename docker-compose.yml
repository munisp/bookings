name: opendesk
include:
- infra/docker-compose.core.yml
- infra/docker-compose.edge.yml
- infra/docker-compose.lakehouse.yml
- infra/docker-compose.crm.yml
- infra/docker-compose.observability.yml
networks:
  opendesk:
    driver: bridge
x-app-env:
  DAPR_HOST: ${DAPR_HOST:-}
  DAPR_HTTP_PORT: '3500'
  KAFKA_BROKERS: kafka:9092
  REDIS_ADDR: redis:6379
  PG_DSN: postgres://opendesk:opendesk@postgres:5432
  KEYCLOAK_URL: http://keycloak:8080
  PERMIFY_HTTP: http://permify:3476
  TEMPORAL_ADDRESS: temporal:7233
  TEMPORAL_NAMESPACE: opendesk
  TEMPORAL_TASK_QUEUE: opendesk-main
  OPENSEARCH_ADDR: http://opensearch:9200
x-daprd:
  image: daprio/daprd:1.14.4
  command: &id001
  - ./daprd
  - --app-id
  - ${DAPR_APP_ID}
  - --app-port
  - ${DAPR_APP_PORT}
  - --components-path
  - /components
  - --config
  - /components/config.yaml
  - --log-level
  - info
  volumes: &id002
  - ./infra/dapr/components:/components
  networks: &id003
  - opendesk
services:
  identity:
    build: ./services/identity-service
    # Optional: secrets/dev overrides (compose still boots without it —
    # every ${VAR} below carries a dev fallback). cp .env.example .env
    env_file:
    - path: .env
      required: false
    environment:
      DAPR_HOST: daprd-identity
      DAPR_HTTP_PORT: '3500'
      KAFKA_BROKERS: kafka:9092
      REDIS_ADDR: redis:6379
      PG_DSN: postgres://opendesk:opendesk@postgres:5432
      KEYCLOAK_URL: http://keycloak:8080
      PERMIFY_HTTP: http://permify:3476
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: opendesk
      TEMPORAL_TASK_QUEUE: opendesk-main
      OPENSEARCH_ADDR: http://opensearch:9200
      PORT: '7001'
      PG_DATABASE: identity
      KEYCLOAK_ADMIN_CLIENT_ID: service-accounts
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-opendesk-service-secret}
      DATABASE_URL: postgres://opendesk:opendesk@postgres:5432/identity
      INDUSTRIES_DIR: /industries
    volumes:
    - ./industries:/industries:ro
    ports:
    - 7001:7001
    networks:
    - opendesk
    depends_on:
    - postgres
    - keycloak
    - permify
    - kafka
  daprd-identity:
    image: daprio/daprd:1.14.4
    command: *id001
    volumes: *id002
    networks: *id003
    environment:
      DAPR_APP_ID: identity
      DAPR_APP_PORT: '7001'
  booking:
    build: ./services/booking-service
    # Optional: secrets/dev overrides (compose still boots without it —
    # every ${VAR} below carries a dev fallback). cp .env.example .env
    env_file:
    - path: .env
      required: false
    environment:
      DAPR_HOST: daprd-booking
      DAPR_HTTP_PORT: '3500'
      KAFKA_BROKERS: kafka:9092
      REDIS_ADDR: redis:6379
      PG_DSN: postgres://opendesk:opendesk@postgres:5432
      KEYCLOAK_URL: http://keycloak:8080
      PERMIFY_HTTP: http://permify:3476
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: opendesk
      TEMPORAL_TASK_QUEUE: opendesk-main
      OPENSEARCH_ADDR: http://opensearch:9200
      PORT: '7002'
      PG_DATABASE: booking
      # Per-service DB role (SPEC-W3 §2): set BOOKING_PG_USER=app_booking_login
      # + BOOKING_PG_PASS in .env (see 05-app-roles.sql). Default stays
      # opendesk/opendesk for dev parity.
      PG_USER: ${BOOKING_PG_USER:-opendesk}
      PG_PASS: ${BOOKING_PG_PASS:-opendesk}
      DATABASE_URL: postgres://${BOOKING_PG_USER:-opendesk}:${BOOKING_PG_PASS:-opendesk}@postgres:5432/booking
    ports:
    - 7002:7002
    networks:
    - opendesk
    depends_on:
    - postgres
    - kafka
    - temporal
    - permify
  daprd-booking:
    image: daprio/daprd:1.14.4
    command: *id001
    volumes: *id002
    networks: *id003
    environment:
      DAPR_APP_ID: booking
      DAPR_APP_PORT: '7002'
  notification:
    build: ./services/notification-worker
    # Optional: secrets/dev overrides (compose still boots without it —
    # every ${VAR} below carries a dev fallback). cp .env.example .env
    env_file:
    - path: .env
      required: false
    environment:
      DAPR_HOST: daprd-notification
      DAPR_HTTP_PORT: '3500'
      KAFKA_BROKERS: kafka:9092
      REDIS_ADDR: redis:6379
      PG_DSN: postgres://opendesk:opendesk@postgres:5432
      KEYCLOAK_URL: http://keycloak:8080
      PERMIFY_HTTP: http://permify:3476
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: opendesk
      TEMPORAL_TASK_QUEUE: opendesk-main
      OPENSEARCH_ADDR: http://opensearch:9200
      PORT: '7003'
      INDUSTRIES_DIR: /industries
      # GDPR workflows (SPEC-W3 §2): export collection + MinIO bundle upload.
      CONVERSATION_APP_ID: conversation
      PRIVACY_EVENTS_TOPIC: opendesk.privacy.events
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_EXPORTS_BUCKET: exports
    volumes:
    - ./industries:/industries:ro
    ports:
    - 7003:7003
    networks:
    - opendesk
    depends_on:
    - temporal
    - kafka
    - redis
  daprd-notification:
    image: daprio/daprd:1.14.4
    command: *id001
    volumes: *id002
    networks: *id003
    environment:
      DAPR_APP_ID: notification
      DAPR_APP_PORT: '7003'
  payments:
    build: ./services/payments-service
    # Optional: secrets/dev overrides (compose still boots without it —
    # every ${VAR} below carries a dev fallback). cp .env.example .env
    env_file:
    - path: .env
      required: false
    environment:
      DAPR_HOST: daprd-payments
      DAPR_HTTP_PORT: '3500'
      KAFKA_BROKERS: kafka:9092
      REDIS_ADDR: redis:6379
      PG_DSN: postgres://opendesk:opendesk@postgres:5432
      KEYCLOAK_URL: http://keycloak:8080
      PERMIFY_HTTP: http://permify:3476
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: opendesk
      TEMPORAL_TASK_QUEUE: opendesk-main
      OPENSEARCH_ADDR: http://opensearch:9200
      PORT: '7004'
      LEDGER_IMPL: ${LEDGER_IMPL:-sim}
      TIGERBEETLE_ADDR: tigerbeetle:3000
      MOJALOOP_ENDPOINT: http://mojaloop:8444
    ports:
    - 7004:7004
    networks:
    - opendesk
    depends_on:
    - tigerbeetle
    - kafka
  daprd-payments:
    image: daprio/daprd:1.14.4
    command: *id001
    volumes: *id002
    networks: *id003
    environment:
      DAPR_APP_ID: payments
      DAPR_APP_PORT: '7004'
  edge:
    build: ./services/gateway-edge
    environment:
      DAPR_HOST: ${DAPR_HOST:-}
      DAPR_HTTP_PORT: '3500'
      KAFKA_BROKERS: kafka:9092
      REDIS_ADDR: redis:6379
      PG_DSN: postgres://opendesk:opendesk@postgres:5432
      KEYCLOAK_URL: http://keycloak:8080
      PERMIFY_HTTP: http://permify:3476
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: opendesk
      TEMPORAL_TASK_QUEUE: opendesk-main
      OPENSEARCH_ADDR: http://opensearch:9200
      PORT: '7005'
      FLUVIO_ADDR: fluvio:9003
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/opendesk/protocol/openid-connect/certs
    ports:
    - 7005:7005
    networks:
    - opendesk
    depends_on:
    - kafka
    - fluvio
    - keycloak
  voice:
    build: ./services/voice-agent-runtime
    # Optional: secrets/dev overrides (compose still boots without it —
    # every ${VAR} below carries a dev fallback). cp .env.example .env
    env_file:
    - path: .env
      required: false
    environment:
      DAPR_HOST: daprd-voice
      DAPR_HTTP_PORT: '3500'
      KAFKA_BROKERS: kafka:9092
      REDIS_ADDR: redis:6379
      PG_DSN: postgres://opendesk:opendesk@postgres:5432
      KEYCLOAK_URL: http://keycloak:8080
      PERMIFY_HTTP: http://permify:3476
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: opendesk
      TEMPORAL_TASK_QUEUE: opendesk-main
      OPENSEARCH_ADDR: http://opensearch:9200
      PORT: '7006'
      AGENT_BACKEND: ${AGENT_BACKEND:-livekit}
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://ollama:11434/v1}
      LLM_MODEL: ${LLM_MODEL:-qwen3:8b}
      LLM_API_KEY: ${LLM_API_KEY:-ollama}
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
    ports:
    - 7006:7006
    networks:
    - opendesk
    depends_on:
    - kafka
    - identity
    - booking
    - knowledge
  daprd-voice:
    image: daprio/daprd:1.14.4
    command: *id001
    volumes: *id002
    networks: *id003
    environment:
      DAPR_APP_ID: voice
      DAPR_APP_PORT: '7006'
  livekit:
    image: livekit/livekit-server:v1.7
    command: --dev --bind 0.0.0.0
    ports:
    - 7880:7880
    - 7881:7881
    - 7882:7882/udp
    networks:
    - opendesk
  conversation:
    build: ./services/conversation-service
    environment:
      DAPR_HOST: daprd-conversation
      DAPR_HTTP_PORT: '3500'
      KAFKA_BROKERS: kafka:9092
      REDIS_ADDR: redis:6379
      PG_DSN: postgres://opendesk:opendesk@postgres:5432
      KEYCLOAK_URL: http://keycloak:8080
      PERMIFY_HTTP: http://permify:3476
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: opendesk
      TEMPORAL_TASK_QUEUE: opendesk-main
      OPENSEARCH_ADDR: http://opensearch:9200
      PORT: '7007'
      PG_DATABASE: conversation
      FLUVIO_ADDR: fluvio:9003
      TRANSCRIPT_SINK: ${TRANSCRIPT_SINK:-kafka}
    ports:
    - 7007:7007
    networks:
    - opendesk
    depends_on:
    - postgres
    - kafka
    - opensearch
  daprd-conversation:
    image: daprio/daprd:1.14.4
    command: *id001
    volumes: *id002
    networks: *id003
    environment:
      DAPR_APP_ID: conversation
      DAPR_APP_PORT: '7007'
  knowledge:
    build: ./services/knowledge-service
    environment:
      DAPR_HOST: daprd-knowledge
      DAPR_HTTP_PORT: '3500'
      KAFKA_BROKERS: kafka:9092
      REDIS_ADDR: redis:6379
      PG_DSN: postgres://opendesk:opendesk@postgres:5432
      KEYCLOAK_URL: http://keycloak:8080
      PERMIFY_HTTP: http://permify:3476
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: opendesk
      TEMPORAL_TASK_QUEUE: opendesk-main
      OPENSEARCH_ADDR: http://opensearch:9200
      PORT: '7008'
      PG_DATABASE: knowledge
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
    ports:
    - 7008:7008
    networks:
    - opendesk
    depends_on:
    - postgres
    - opensearch
  daprd-knowledge:
    image: daprio/daprd:1.14.4
    command: *id001
    volumes: *id002
    networks: *id003
    environment:
      DAPR_APP_ID: knowledge
      DAPR_APP_PORT: '7008'
  analytics:
    build: ./services/analytics-pipeline
    environment:
      DAPR_HOST: ${DAPR_HOST:-}
      DAPR_HTTP_PORT: '3500'
      KAFKA_BROKERS: kafka:9092
      REDIS_ADDR: redis:6379
      PG_DSN: postgres://opendesk:opendesk@postgres:5432
      KEYCLOAK_URL: http://keycloak:8080
      PERMIFY_HTTP: http://permify:3476
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: opendesk
      TEMPORAL_TASK_QUEUE: opendesk-main
      OPENSEARCH_ADDR: http://opensearch:9200
      PORT: '7009'
      ICEBERG_REST: http://iceberg-rest:8181
      ICEBERG_WAREHOUSE: s3://lake/warehouse
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT_URL: http://minio:9000
      BATCH_SIZE: '500'
      FLUSH_INTERVAL: '15'
    ports:
    - 7009:7009
    networks:
    - opendesk
    depends_on:
    - kafka
    - iceberg-rest
    - minio
  web:
    build: ./apps/admin-web
    # Optional: secrets/dev overrides (compose still boots without it —
    # every ${VAR} below carries a dev fallback). cp .env.example .env
    env_file:
    - path: .env
      required: false
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:9080
      NEXT_PUBLIC_WS_BASE: ws://localhost:9080/ws
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/opendesk
      KEYCLOAK_CLIENT_ID: admin-web
      AUTH_SECRET: ${AUTH_SECRET:-dev-secret-change-me}
      API_BASE_URL: http://apisix:9080
      KEYCLOAK_ISSUER_PUBLIC: http://localhost:8080/realms/opendesk
      AUTH_URL: http://localhost:3001
      AUTH_TRUST_HOST: 'true'
    ports:
    - 3001:3001
    networks:
    - opendesk
    depends_on:
    - apisix
    - keycloak
  ollama:
    image: ollama/ollama:0.5.7
    profiles:
    - voice
    volumes:
    - ollama-models:/root/.ollama
    networks:
    - opendesk
    ports:
    - 11434:11434
  ollama-init:
    image: ollama/ollama:0.5.7
    profiles:
    - voice
    networks:
    - opendesk
    depends_on:
    - ollama
    entrypoint: /bin/sh -c "sleep 5 && OLLAMA_HOST=http://ollama:11434 ollama pull $${LLM_MODEL:-qwen3:8b}"
  piper:
    build:
      context: ./services/voice-agent-runtime/sidecar
    profiles:
    - voice
    networks:
    - opendesk
    ports:
    - 5500:5500
  voice-worker:
    build:
      context: ./services/voice-agent-runtime
    profiles:
    - voice
    networks:
    - opendesk
    # Optional: secrets/dev overrides (compose still boots without it —
    # every ${VAR} below carries a dev fallback). cp .env.example .env
    env_file:
    - path: .env
      required: false
    command:
    - python
    - -m
    - app.livekit_worker
    environment:
      DAPR_HOST: daprd-voice
      DAPR_HTTP_PORT: '3500'
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
      LLM_BASE_URL: http://ollama:11434/v1
      LLM_MODEL: ${LLM_MODEL:-qwen3:8b}
      LLM_API_KEY: ${LLM_API_KEY:-ollama}
      PIPER_URL: http://piper:5500
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      KAFKA_BROKERS: kafka:9092
      AGENT_BACKEND: ${AGENT_BACKEND:-livekit}
    depends_on:
    - livekit
    - voice
    - ollama
  crm-sync:
    build: ./services/crm-sync-service
    # Optional: secrets/dev overrides (compose still boots without it —
    # every ${VAR} below carries a dev fallback). cp .env.example .env
    env_file:
    - path: .env
      required: false
    environment:
      DAPR_HOST: daprd-crm-sync
      DAPR_HTTP_PORT: '3500'
      KAFKA_BROKERS: kafka:9092
      PG_DSN: postgres://opendesk:opendesk@postgres:5432
      PORT: '7010'
      DATABASE_URL: postgres://opendesk:opendesk@postgres:5432/crm_sync
      TWENTY_API_URL: http://twenty-api:3000
      TWENTY_API_KEY: ${TWENTY_API_KEY:-opendesk-dev-twenty-api-key}
      TWENTY_WEBHOOK_SECRET: ${TWENTY_WEBHOOK_SECRET:-opendesk-dev-twenty-webhook-secret}
      TWENTY_RATE_PER_MIN: '90'
      DAPR_PUBSUB_NAME: pubsub-kafka
      CRM_EVENTS_TOPIC: opendesk.crm.events
      IDENTITY_EVENTS_TOPIC: opendesk.identity.events
      BOOKING_EVENTS_TOPIC: opendesk.booking.events
      CONVERSATION_EVENTS_TOPIC: opendesk.conversation.events
      CONSUMER_GROUP: crm-sync
      DLQ_TOPIC: opendesk.dlq
    ports:
    - 7010:7010
    networks:
    - opendesk
    depends_on:
    - kafka
    - postgres
    - twenty-api
  daprd-crm-sync:
    image: daprio/daprd:1.14.4
    command: *id001
    volumes: *id002
    networks: *id003
    environment:
      DAPR_APP_ID: crm-sync
      DAPR_APP_PORT: '7010'
volumes:
  ollama-models: null
