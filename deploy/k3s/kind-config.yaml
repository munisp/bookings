# kind cluster config for rehearsing the k3s edge appliance locally:
#   kind create cluster --config deploy/k3s/kind-config.yaml --name opendesk-edge
# One control-plane node + one worker approximates the single-node appliance
# while leaving room for MM2 and middleware pods. Port mappings expose the
# gateway and Grafana on the host.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: opendesk-edge
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080   # APISIX gateway NodePort
        hostPort: 9080
      - containerPort: 30002   # Grafana NodePort
        hostPort: 3002
  - role: worker
