# Representative app Deployment for the k3s edge appliance (see
# identity-deployment.yaml header for image-name convention).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  namespace: opendesk
  labels:
    app: notification
    app.kubernetes.io/part-of: opendesk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
    spec:
      containers:
        - name: notification
          image: opendesk-notification:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7003
          env:
            - name: PORT
              value: "7003"
            - name: PG_DSN
              value: postgres://opendesk:opendesk@postgres:5432
            - name: KAFKA_BROKERS
              value: kafka:9092
            - name: REDIS_ADDR
              value: redis:6379
            - name: TEMPORAL_ADDRESS
              value: temporal:7233
            - name: TEMPORAL_NAMESPACE
              value: opendesk
            - name: TEMPORAL_TASK_QUEUE
              value: opendesk-main
          readinessProbe:
            httpGet:
              path: /healthz
              port: 7003
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 7003
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: notification
  namespace: opendesk
spec:
  selector:
    app: notification
  ports:
    - port: 7003
      targetPort: 7003
